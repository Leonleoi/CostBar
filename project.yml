name: CostBar-kx
options:
  bundleIdPrefix: com.costbar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CostBar-kx:
    type: application
    platform: macOS
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: CostBar-kx.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.personal-information.keychain: true
    sources:
      - path: CostBar-kxApp.swift
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Storage
      - path: Utils
      - path: Support
      - path: Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.costbar.kx
        ENABLE_HARDENED_RUNTIME: true
    dependencies: []

  CostBar-kxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: kxTests
        type: group
    dependencies:
      - target: CostBar-kx
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CostBar-kx.app/Contents/MacOS/CostBar-kx"
        BUNDLE_LOADER: "$(TEST_HOST)"
